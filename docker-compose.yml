version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: fleet_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: fleet_system
    networks:
      - fleet_net
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: fleet_backend
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - fleet_net
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src:ro

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../docker/ai-service.Dockerfile
    container_name: fleet_ai
    ports:
      - '3002:3002'
    networks:
      - fleet_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: fleet_frontend
    ports:
      - '5173:80'
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api/v1
    depends_on:
      - backend
    networks:
      - fleet_net
    restart: unless-stopped

networks:
  fleet_net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
